<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoltGlide | Reset Your Password</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2300ff88'%3E%3Cpath d='M12 2L3.5 14h6.5v8l8.5-12h-6.5z'/%3E%3C/svg%3E">
    <meta name="description" content="Reset your VoltGlide account password.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme" style="padding-top: 0;">

    <div id="toast-container" class="toast-container"></div>

    <!-- FORGOT PASSWORD PAGE -->
    <main id="forgot-password-view" class="view-container">
        <div class="auth-page-wrapper">
            <div class="auth-header-toggles">
                <button class="theme-btn dashboard-theme-btn" onclick="toggleTheme()" aria-label="Toggle Theme">
                    <span class="theme-icon-light"><i class="fa-solid fa-sun"></i></span>
                    <span class="theme-icon-dark"><i class="fa-solid fa-moon"></i></span>
                </button>
                <button class="rtl-btn dashboard-rtl-btn" onclick="toggleDirection()" aria-label="Toggle Layout Direction">
                    <span class="rtl-circle">LTR</span>
                </button>
            </div>

            <div class="auth-container glass-card">
                <div class="auth-logo">
                    <a href="index.html" class="logo-link">
                        <span class="logo-icon"><i class="fa-solid fa-bolt-lightning"></i></span>
                        <span class="logo-text">Volt<span class="highlight">Glide</span></span>
                    </a>
                </div>
                <h2>Reset Your Password</h2>
                <p class="auth-subtitle">Enter the email associated with your account and we'll send you reset instructions.</p>

                <form id="forgot-password-form" onsubmit="handleForgotPasswordSubmit(event)">
                    <div class="form-group text-left" style="text-align: left;">
                        <label for="forgot-email">Email Address</label>
                        <input type="email" id="forgot-email" placeholder="name@domain.com" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full margin-top-md">Send Reset Link</button>
                </form>

                <div class="auth-footer-link">
                    Remembered your password? <a href="login.html">Log In</a>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
