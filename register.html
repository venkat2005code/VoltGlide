<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoltGlide | Create Account</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2300ff88'%3E%3Cpath d='M12 2L3.5 14h6.5v8l8.5-12h-6.5z'/%3E%3C/svg%3E">
    <meta name="description" content="Create your VoltGlide account to access custom e-scooter diagnostics, repair tracking, and parts shop.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme" style="padding-top: 0;">

    <div id="toast-container" class="toast-container"></div>

    <!-- REGISTER PAGE -->
    <main id="register-view" class="view-container">
        <div class="auth-page-wrapper">
            <!-- Top Right Corner Toggles -->
            <div class="auth-header-toggles">
                <button class="theme-btn dashboard-theme-btn" onclick="toggleTheme()" aria-label="Toggle Theme">
                    <span class="theme-icon-light"><i class="fa-solid fa-sun"></i></span>
                    <span class="theme-icon-dark"><i class="fa-solid fa-moon"></i></span>
                </button>
                <button class="rtl-btn dashboard-rtl-btn" onclick="toggleDirection()" aria-label="Toggle Layout Direction">
                    <span class="rtl-circle">LTR</span>
                </button>
            </div>

            <div class="auth-container glass-card">
                <!-- VoltGlide Logo at top of container -->
                <div class="auth-logo">
                    <a href="index.html" class="logo-link">
                        <span class="logo-icon"><i class="fa-solid fa-bolt-lightning"></i></span>
                        <span class="logo-text">Volt<span class="highlight">Glide</span></span>
                    </a>
                </div>
                <h2>Create Your Account</h2>
                <p class="auth-subtitle">Join VoltGlide to access custom e-scooter diagnostics.</p>

                <form id="register-form-submit" onsubmit="handleRegisterSubmit(event)">
                    <div class="form-group text-left" style="text-align: left;">
                        <label for="reg-name">Full Name</label>
                        <input type="text" id="reg-name" placeholder="Marcus Vance" required>
                    </div>
                    <div class="form-group text-left" style="text-align: left;">
                        <label for="reg-email">Email Address</label>
                        <input type="email" id="reg-email" placeholder="name@domain.com" required>
                    </div>
                    <div class="form-group text-left" style="text-align: left;">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" placeholder="••••••••" required>
                    </div>
                    <div class="form-group text-left" style="text-align: left;">
                        <label for="reg-confirm">Confirm Password</label>
                        <input type="password" id="reg-confirm" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full margin-top-md">Register Account</button>
                </form>

                <!-- Social Logins -->
                <div class="social-login-separator"><span>or continue with</span></div>
                <div class="social-login-buttons">
                    <button class="btn btn-social-google" onclick="showToast('Google signup is not integrated yet.', 'error')">
                        <i class="fa-brands fa-google"></i> Google
                    </button>
                    <button class="btn btn-social-facebook" onclick="showToast('Facebook signup is not integrated yet.', 'error')">
                        <i class="fa-brands fa-facebook-f"></i> Facebook
                    </button>
                    <button class="btn btn-social-apple" onclick="showToast('Apple signup is not integrated yet.', 'error')">
                        <i class="fa-brands fa-apple"></i> Apple
                    </button>
                </div>

                <!-- Already have an account link -->
                <div class="auth-footer-link">
                    Already have an account? <a href="login.html">Log In</a>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
